name: CI - Tests et validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration du python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13.1

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-flask bandit safety

      - name: SAST - Scan Bandit
        run: |
          echo "Bandit scan started (Static Analyse Tool)"
          bandit app.py -f screen
          bandit app.py -f json -o bandit-report.json

      - name: SCA - Scan Safety
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        if: always()
        run: |
          echo "Safety scan started (Depandancies scan Tool)"
          safety scan -r requirements.txt --full-report
          safety scan -r requirements.txt --json > safety-report.json

      - name: Build Docker Image
        if: always()
        run: |
          docker buildx build -t secdevopsbank:${{ github.sha }} .
          docker save secdevopsbank:${{ github.sha }} -o /tmp/secdevopsbank.tar

      - name: Installation de Trivy
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Scan Trivy
        if: always()
        run: |
          trivy image --input /tmp/secdevopsbank.tar --severity CRITICAL,HIGH

      - name: 🚀 Run application
        if: always()
        run: |
          docker run -d -p 5000:5000 --name app secdevopsbank:${{ github.sha }}
          sleep 10
          curl -f http://localhost:5000 || echo "Application démarrée"

      - name: 🕷️ ZAP Scan (approche directe)
        if: always()
        run: |
          # Créer un dossier pour les rapports avec les bonnes permissions
          mkdir -p zap-output
          chmod 777 zap-output

          # Lancer ZAP en arrière-plan
          docker run -d \
            --name zap \
            -v $(pwd)/zap-output:/zap/wrk:rw \
            -p 8080:8080 \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -port 8080 -host 0.0.0.0 -config api.disablekey=true

          # Attendre que ZAP démarre
          echo "⏳ Attente du démarrage de ZAP..."
          sleep 15

          # Vérifier que ZAP est prêt
          echo "🔍 Vérification de ZAP..."
          curl -s http://localhost:8080/JSON/core/view/version/ || echo "ZAP démarré"

          # Lancer le scan actif via l'API
          echo "🕷️ Démarrage du scan actif..."

          # Accéder à l'URL
          curl -s "http://localhost:8080/JSON/spider/action/scan/?url=http://host.docker.internal:5000&maxChildren=10" || true

          sleep 5

          # Démarrer le scan actif
          curl -s "http://localhost:8080/JSON/ascan/action/scan/?url=http://host.docker.internal:5000" || true

          # Attendre la fin du scan
          echo "⏳ Scan en cours (attente de 60 secondes)..."
          sleep 60

          # Générer le rapport HTML
          echo "📊 Génération du rapport..."
          curl -s "http://localhost:8080/JSON/reports/action/generate/?reportTitle=ZAP%20Scan%20Report&reportFileName=zap_report&theme=modern&displayReport=true" || true

          # Récupérer le rapport
          sleep 5
          docker exec zap cat /zap/wrk/zap_report.html > zap-output/zap_report.html || echo "Rapport généré"

          # Afficher un résumé
          echo "📋 Résumé du scan:"
          docker exec zap zap-cli alerts -l High -c || echo "Aucune alerte High trouvée"

          # Nettoyer
          docker stop zap && docker rm zap || true
          docker stop app && docker rm app || true

      - name: 📤 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: zap-output/
          if-no-files-found: warn

      - name: Execution des tests
        run: |
          cd tests
          pip install pytest
          pytest test_app.py -v

      - name: Rapport des tests
        if: always()
        run: |
          echo "tests terminés"
          echo "Consultez les logs ci-dessus pour les détails"

      - name: Upload des rapports de securité
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

      - name: 🔍 Vérification de la structure du projet
        run: |
          echo "📁 Structure du projet:"
          ls -la
          echo ""

      - name: Afficher des informations
        if: always()
        run: |
          echo "Pipeline executed with success"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
