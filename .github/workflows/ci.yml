name: CI - Tests et validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration du python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13.1

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execution des tests
        run: |
          cd tests
          pip install pytest
          pytest test_app.py -v

      - name: Rapport des tests
        if: always()
        run: |
          echo "tests terminés"
          echo "Consultez les logs ci-dessus pour les détails"

      - name: 🔍 Vérification de la structure du projet
        run: |
          echo "📁 Structure du projet:"
          ls -la
          echo ""

      - name: Afficher des informations
        run: |
          echo "Pipeline executed with success"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
