name: CI - Tests et validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration du python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13.1

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-flask bandit safety

      - name: SAST - Scan Bandit
        run: |
          echo "Bandit scan started (Static Analyse Tool)"
          bandit app.py -f screen
          bandit app.py -f json -o bandit-report.json

      - name: SCA - Scan Safety
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        if: always()
        run: |
          echo "Safety scan started (Depandancies scan Tool)"
          safety scan -r requirements.txt --full-report
          safety scan -r requirements.txt --json > safety-report.json

      - name: Build Docker Image
        if: always()
        run: |
          docker buildx build -t secdevopsbank:${{ github.sha }} .
          docker save secdevopsbank:${{ github.sha }} -o /tmp/secdevopsbank.tar

      - name: Installation de Trivy
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Scan Trivy
        if: always()
        run: |
          trivy image --input /tmp/secdevopsbank.tar --severity CRITICAL,HIGH

      - name: 🚀 Run app for ZAP
        if: always()
        run: |
          docker run -d -p 5000:5000 --name app secdevopsbank:${{ github.sha }}
          sleep 10

      - name: 🕷️ ZAP Scan with Docker
        if: always()
        run: |
          # Créer un dossier pour les rapports
          mkdir -p zap-output
          chmod 777 zap-output
          
          # Lancer ZAP en mode daemon
          docker run -d --name zap -p 8080:8080 \
            -v $PWD/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -port 8080 -host 0.0.0.0 -config api.disablekey=true
          
          sleep 10
          
          # Lancer le scan via l'API
          docker exec zap zap-cli quick-scan --self-contained \
            --start-options '-config api.disablekey=true' \
            http://host.docker.internal:5000
          
          # Générer le rapport
          docker exec zap zap-cli report -o /zap/wrk/zap_report.html -f html
          
          # Nettoyer
          docker stop zap && docker rm zap
          docker stop app && docker rm app

      - name: 📤 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html

      - name: 🧹 Cleanup
        if: always()
        run: docker rm -f app || true

      - name: Execution des tests
        run: |
          cd tests
          pip install pytest
          pytest test_app.py -v

      - name: Rapport des tests
        if: always()
        run: |
          echo "tests terminés"
          echo "Consultez les logs ci-dessus pour les détails"

      - name: Upload des rapports de securité
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

      - name: 🔍 Vérification de la structure du projet
        run: |
          echo "📁 Structure du projet:"
          ls -la
          echo ""

      - name: Afficher des informations
        run: |
          echo "Pipeline executed with success"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
