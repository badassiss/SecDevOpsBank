name: CI - Tests et validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v3

      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Installation des dépendances
        run: |
          cd app
          pip install -r requirements.txt

      - name: 🧪 Exécution des tests
        run: |
          cd tests
          pip install pytest
          pytest test_app.py -v

      - name: 📊 Rapport de test
        if: always()
        run: |
          echo "✅ Tests terminés"
          echo "📝 Consultez les logs ci-dessus pour les détails"

      - name: 🔍 Vérification de la structure du projet
        run: |
          echo "📁 Structure du projet:"
          ls -la
          echo ""

      - name: afficher des informations
        run: |
          echo "Pipeline executed with success"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
